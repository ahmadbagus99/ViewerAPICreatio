services:
  database:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    profiles: [managed-db]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - viewer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  viewer:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
        required: false
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-database}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      VIEWER_PUBLIC_URL: ${VIEWER_PUBLIC_URL}
      VIEWER_ADMIN_USERNAME: ${VIEWER_ADMIN_USERNAME}
      VIEWER_ADMIN_PASSWORD: ${VIEWER_ADMIN_PASSWORD}
      VIEWER_SESSION_SECRET: ${VIEWER_SESSION_SECRET}
      VIEWER_COOKIE_SECURE: ${VIEWER_COOKIE_SECURE}
    ports:
      - "${VIEWER_PORT:-5003}:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - viewer_runtime:/app/.runtime
    networks:
      - default
      - creatio-shared

volumes:
  viewer_postgres_data:
  viewer_runtime:

networks:
  creatio-shared:
    external: true
    name: shared_creatio-shared
