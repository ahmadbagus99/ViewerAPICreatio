<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login - Creatio API Viewer</title>
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png?v=1" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="viewer.css?v=20260624-footer" />
  </head>
  <body class="auth-page">
    <main class="auth-panel">
      <div class="mb-4">
        <div class="auth-mark mb-3">
          <i class="bi bi-braces" aria-hidden="true"></i>
        </div>
        <p class="eyebrow">Viewer Management</p>
        <h1 class="h3 mb-2">Admin Login</h1>
        <p class="text-secondary mb-0">Manage published API documentation.</p>
      </div>
      <form id="login-form">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" class="form-control" type="text" autocomplete="username" required autofocus />
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input id="password" class="form-control" type="password" autocomplete="current-password" required />
        </div>
        <div id="login-error" class="form-message mb-2" role="alert"></div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
          <span class="ms-1">Login</span>
        </button>
        <a href="/" class="btn btn-link text-decoration-none w-100 mt-2">Back to Viewer</a>
      </form>
    </main>
    <script src="login.js?v=20260624-2"></script>
  </body>
</html>
