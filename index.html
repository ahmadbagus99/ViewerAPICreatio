<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creatio API Viewer</title>
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png?v=1" />
    <link rel="shortcut icon" href="/favicon.ico?v=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <link rel="stylesheet" href="viewer.css?v=20260624-footer" />
  </head>
  <body class="public-viewer-page">
    <header class="viewer-titlebar">
      <div class="container-fluid px-3 px-lg-4 py-3">
        <div class="viewer-brand">
          <span class="d-block fw-bold">Creatio API Viewer</span>
          <div class="d-flex align-items-center gap-2 mt-1">
            <small id="viewer-meta" class="text-secondary">Loading API documentation.</small>
            <span id="status-badge" class="badge text-bg-success d-none">Active</span>
          </div>
        </div>
      </div>
    </header>

    <main class="viewer-main">
      <div id="empty-state" class="container py-5 d-none">
        <div class="alert alert-secondary d-flex align-items-center gap-3 mb-0" role="alert">
          <i class="bi bi-info-circle fs-4" aria-hidden="true"></i>
          <span id="empty-message">No documentation has been published.</span>
        </div>
      </div>
      <div id="swagger-ui"></div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="viewer.js?v=20260624-8"></script>
  </body>
</html>
